name: Auto-approve ruff upgrade PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  verify-and-approve:
    name: Verify and approve
    runs-on: ubuntu-latest
    # Only run on PRs created by the automation bot
    if: github.actor == 'github-actions[bot]' && startsWith(github.head_ref, 'ruff-upgrade-')

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verify only expected files changed
        id: verify
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          ALLOWED="Cargo.toml
          Cargo.lock
          pyproject.toml
          README.md"

          UNEXPECTED=""
          while IFS= read -r file; do
            if ! echo "$ALLOWED" | grep -qxF "$file"; then
              UNEXPECTED="$UNEXPECTED $file"
            fi
          done <<< "$CHANGED"

          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected files changed:$UNEXPECTED"
            exit 1
          fi
          echo "All changed files are expected — safe to auto-approve."

      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --approve \
            --body "All changed files verified. Auto-approving for merge once CI passes."

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --squash \
            --delete-branch
