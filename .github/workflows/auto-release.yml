name: Auto-release after ruff upgrade

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Create release if ruff upgrade merged
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.event == 'push'
          && github.event.workflow_run.head_branch == 'main'
          && contains(github.event.workflow_run.head_commit.message, 'chore: upgrade ruff to') }}

    steps:
      - name: Validate triggering PR
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"

          MATCHING_COUNT=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/commits/${SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null and .base.ref == "main" and (.title | startswith("chore: upgrade ruff to")) and (.head.ref | startswith("ruff-upgrade-")))] | length')

          if [ "${MATCHING_COUNT}" -gt 0 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read version from Cargo.toml
        if: steps.guard.outputs.should_release == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CARGO_TOML=$(gh api \
            -H "Accept: application/vnd.github.v3.raw" \
            "/repos/${{ github.repository }}/contents/Cargo.toml" \
            --jq -r '.content' | base64 -d)
          VERSION=$(echo "$CARGO_TOML" | python3 -c "import re,sys; m=re.search(r'^version = \"([^\"]+)\"', sys.stdin.read(), re.MULTILINE); print(m.group(1) if m else '')")
          RUFF_VERSION=$(echo "$CARGO_TOML" | python3 -c "import re,sys; m=re.search(r'tag = \"([^\"]+)\"', sys.stdin.read()); print(m.group(1) if m else '')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ruff_version=$RUFF_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        if: steps.guard.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          RUFF_VERSION=${{ steps.version.outputs.ruff_version }}
          gh release create "v${VERSION}" \
            --title "ruffian v${VERSION}" \
            --notes "Dependency upgrade: built against ruff ${RUFF_VERSION}."
