version: "3"

vars:
  CARGO:
    sh: echo "$HOME/.cargo/bin/cargo"
  RUSTUP:
    sh: echo "$HOME/.cargo/bin/rustup"
  COVERAGE_THRESHOLD: "85"

tasks:
  setup:
    desc: Install all prerequisites for development
    cmds:
      - brew install rustup
      - rustup-init -y
      - task: toolchain
      - pip install maturin

  toolchain:
    desc: Install all required dev tools and rustup components
    internal: true
    cmds:
      - "{{.RUSTUP}} component add llvm-tools-preview"
      - "{{.CARGO}} install cargo-llvm-cov --quiet"

  install:local:
    desc: Build and install ruffian into the active Python environment for local testing
    cmd: maturin develop --release

  build:
    desc: Build the ruffian binary (debug)
    cmd: "{{.CARGO}} build"

  build:release:
    desc: Build the ruffian binary (release)
    cmd: "{{.CARGO}} build --release"

  test:
    desc: Run all tests
    cmd: "{{.CARGO}} test"

  test:coverage:
    desc: Run tests with coverage report, fail below 85%
    cmds:
      - task: toolchain
      - "{{.CARGO}} llvm-cov --fail-under-lines {{.COVERAGE_THRESHOLD}} --fail-under-functions {{.COVERAGE_THRESHOLD}}"

  test:coverage:report:
    desc: Open an HTML coverage report showing missed lines
    cmds:
      - task: toolchain
      - "{{.CARGO}} llvm-cov --open --fail-under-lines {{.COVERAGE_THRESHOLD}} --fail-under-functions {{.COVERAGE_THRESHOLD}}"

  lint:
    desc: Run clippy
    cmd: "{{.CARGO}} clippy -- -D warnings"

  lint:fix:
    desc: Run clippy with auto-fix and format
    cmds:
      - "{{.CARGO}} clippy --fix --allow-dirty -- -D warnings"
      - "{{.CARGO}} fmt"

  fmt:
    desc: Format source code
    cmd: "{{.CARGO}} fmt"

  fmt:check:
    desc: Check formatting without writing changes
    cmd: "{{.CARGO}} fmt -- --check"

  version:bump:
    desc: "Bump version in Cargo.toml and push. Auto-increments minor if no version given. Usage: task version:bump [-- X.Y.Z]"
    vars:
      NEW_VERSION:
        sh: python3 scripts/bump_version.py {{.CLI_ARGS}}
    cmds:
      - "{{.CARGO}} generate-lockfile"
      - git add Cargo.toml Cargo.lock
      - 'git commit -m "chore: bump version to {{.NEW_VERSION}}"'
      - git push

  release:
    desc: "Create a GitHub release: checks version, waits for CI, generates notes, opens editor, then waits for publish to finish. Usage: task release"
    cmd: python3 scripts/create_release.py

  ruff:update:
    desc: Update ruff git dependency pins to the latest release
    cmds:
      - python3 scripts/update_ruff.py
      - "{{.CARGO}} build"

  clean:
    desc: Remove build artifacts
    cmd: "{{.CARGO}} clean"

  publish:
    desc: Build and publish Python wheel to PyPI via maturin
    cmds:
      - task: toolchain
      - maturin build --release
      - maturin publish
